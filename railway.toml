[build]
builder = "nixpacks"
buildCommand = "corepack enable && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @webshop-crm/shared build"

[deploy]
startCommand = "corepack enable && pnpm --filter @webshop-crm/api db:migrate && pnpm --filter @webshop-crm/api start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
